<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>페이지를 찾을 수 없습니다 - ISeeSocial</title>
    <meta name="robots" content="noindex,follow" />
    <style>
      :root {
        color: #111827;
        background: #f7f7f5;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      body {
        margin: 0;
      }

      main {
        box-sizing: border-box;
        width: min(720px, 100%);
        margin: 0 auto;
        padding: 48px 20px 56px;
      }

      .panel {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        background: #ffffff;
        padding: 28px;
        box-shadow: 0 1px 2px rgb(15 23 42 / 0.04);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: #64748b;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1.08;
      }

      p {
        color: #4b5563;
        font-size: 15px;
        line-height: 1.75;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      a {
        border: 1px solid #dbeafe;
        border-radius: 999px;
        background: #eff6ff;
        color: #1d4ed8;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <p class="eyebrow">404</p>
        <h1>페이지를 찾을 수 없습니다.</h1>
        <p>
          요청한 주소가 없거나 이동되었습니다. ISeeSocial은 현재 분석 화면, 내보내기 가이드,
          개인정보 안내 페이지만 공개합니다.
        </p>
        <nav aria-label="이동할 수 있는 페이지">
          <a href="/">분석 화면으로 이동</a>
          <a href="/instagram-export-guide.html">내보내기 가이드</a>
          <a href="/privacy.html">개인정보 안내</a>
        </nav>
      </section>
    </main>
  </body>
</html>
